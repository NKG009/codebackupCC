<template>
    <div class="slds-p-left_small">
        <lightning-card title="Time Tracking">
            <div class="slds-p-around_small">
           <!-- <lightning-button variant="success" label="Time Details" onclick={GetTimerecord} class="slds-m-left_x-small"></lightning-button>-->
                    <img style="float: center; margin: 0px 0px 2px 500px;" src={TDlogo} width="170"/>
            </div>
        </lightning-card>
        <template if:true={Spinnerboolean}>
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
        </template>
        <template if:true={datatableshow}>
        <div style="height: 300px;">
            <lightning-datatable
                    key-field="UserId"
                    data={data}
                    columns={columns}
                    hide-checkbox-column=true>
            </lightning-datatable>
        </div>
        </template>
    </div>
</template>
