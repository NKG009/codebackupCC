Date: 8th Aug 2024
Description : LWC for Add/Remove Credential Requirements Button on Job Object
Jira : https://targetrecruit.atlassian.net/browse/WAVE-352 -->

<template>
    <template if:false={showTabs}>
        <button  onclick={handleConfirmClick} class="slds-m-bottom_medium btn_addremove">Add/Remove Credential Requirements</button>
       <!-- <lightning-button label="Add/Remove Credential Requirements" onclick={handleConfirmClick} class="slds-m-bottom_medium btn_addremove"></lightning-button>-->
    </template>
    <template if:true={showTabs}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 class="slds-text-heading_medium">Manage Credential Requirements</h2>
                </header>
                <div class="slds-modal__content slds-p-around_xx_small">
                    <lightning-tabset class="slds-p-around_medium">
                        <lightning-tab label="Add Requirement" class="slds-m-around_medium" value="add" active-tab-value={activeTab} onactive={handleTabChange}>
                            <div class="slds-is-relative">
                              <!--  <p>Please select Credential Master to create Credential Requirements</p> -->
                                <lightning-input type="search" label="Search Credential Masters" placeholder="search here..." value={searchKey} onchange={handleSearchKeyChange}></lightning-input>
                                <template if:true={hasQuestions}>
                                    <template for:each={questions} for:item="question">
                                        <div key={question.Id} class="slds-m-around_small">
                                            <lightning-input type="checkbox" label={question.CRDNTLS__Question__c} value={question.Id} onchange={handleSelectQuestion}></lightning-input>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={hasQuestions}>
                                    <p>No active Credential Masters found.</p>
                                </template>
                            </div>
                        </lightning-tab>
                        <lightning-tab label="Remove Requirement" class="slds-m-around_medium" value="remove" active-tab-value={activeTab} onactive={handleTabChange}>
                            <div class="slds-is-relative">
                              <!--  <p>Please select Credential Requirements to delete</p> -->
                                <lightning-input type="search" label="Search Credential Requirements" placeholder="search here..." value={searchKeyRemove} onchange={handleSearchKeyChangeRemove}></lightning-input>
                                <template if:true={hasRequirements}>
                                    <template for:each={requirements} for:item="requirement">
                                        <div key={requirement.Id} class="slds-m-around_small">
                                            <lightning-input type="checkbox" label={requirement.Name} value={requirement.Id} onchange={handleSelectRequirement}></lightning-input>
                                        </div>
                                    </template>
                                </template>
                                <template if:false={hasRequirements}>
                                    <p>No related Credential Requirements found.</p>
                                </template>
                            </div>
                        </lightning-tab>
                    </lightning-tabset>
                </div>
                <footer class="slds-modal__footer">
    <template if:true={isAddTabActive}>
        <lightning-button variant="brand" label="Create Requirements" onclick={handleCreateRequirements}></lightning-button>
    </template>
    <template if:true={isRemoveTabActive}>
        <lightning-button variant="destructive" label="Delete Requirements" onclick={handleDeleteRequirements}></lightning-button>
    </template>
    <lightning-button class="cancel-button" variant="neutral" label="Cancel" title="Cancel" onclick={handleClose}></lightning-button>
</footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
