<template>
  <lightning-card title="Files" icon-name="custom:custom77">
     <!-- Upload Files Button --><!-- label="Upload Files" -->
     
    <lightning-file-upload
      slot="actions"
      record-id={recordId}
      accept=".pdf,.png,.jpg,.jpeg,.docx"
      onuploadfinished={handleUploadFinished}
      multiple
      >
    </lightning-file-upload>
     
    <template if:true={contentVersions}>
      <lightning-datatable key-field="Id" data={contentVersions} columns={columns} hide-checkbox-column
        onrowaction={handleRowAction} onsave={handleSave} onsort={handleSort} draft-values={draftValues}></lightning-datatable>
    </template>
    <template if:false={contentVersions}>
      <p>No content versions found.</p>
    </template>
     <!-- Confirmation Modal -->
    <template if:true={isModalOpen}>
      <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
          <!-- Modal/Popup Header -->
          <header class="slds-modal__header">
            <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                    title="Close" onclick={closeModal}>
              <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
              <span class="slds-assistive-text">Close</span>
            </button>
            <h2 class="slds-text-heading_medium">Confirm Delete</h2>
          </header>

          <!-- Modal/Popup Body -->
          <div class="slds-modal__content slds-p-around_medium">
            <p>Are you sure you want to delete this document?</p>
          </div>

          <!-- Modal/Popup Footer -->
          <footer class="slds-modal__footer">
            <button class="slds-button slds-button_neutral" onclick={closeModal}>No</button>
            <button class="slds-button slds-button_destructive" onclick={confirmDelete}>Yes</button>
          </footer>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
  </lightning-card>
</template>
