<template>
    <lightning-card title="Repair Invoice" icon-name="custom:custom63">
        <div class="slds-p-around_medium">

            <!-- Invoice Header -->
            <section class="slds-box slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Repair Invoice</h3>
                <p>3010 Lyndon B. Johnson FWY STE 1200, Dallas TX 75234</p>
                <p>Phone: (214) 254-9969</p>
            </section>
<h4 class="slds-text-heading_medium slds-text-align_center">DUE UPON RECEIPT</h4>
            <!-- Invoice Info -->
            <section class="slds-box slds-m-bottom_medium">
                <lightning-input label="Invoice Number" value=""></lightning-input>
                <lightning-input type="date" label="Date" value="2025-09-30"></lightning-input>
            </section>

            <!-- Client Info -->
            <section class="slds-box slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Client Info</h3>
                <lightning-input label="First Name" value=""></lightning-input>
                <lightning-input label="Last Name" value=""></lightning-input>
                <lightning-input label="Street Address" value=""></lightning-input>
                <lightning-input label="Street Address Line 2" value=""></lightning-input>
                <lightning-input label="City" value=""></lightning-input>
                <lightning-input label="State / Province" value=""></lightning-input>
                <lightning-input label="Postal / Zip Code" value=""></lightning-input>
                <lightning-input type="email" label="Client Email"></lightning-input>
            </section>

            <!-- Invoice Details -->
            <section class="slds-box slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Invoice for Contracting Services</h3>
                <lightning-textarea label="Rate includes the following" placeholder="Enter details here"></lightning-textarea>
                <lightning-input type="number" label="Cost including supplements & permit" ></lightning-input>
                <lightning-input type="number" label="Amount Paid To Date" ></lightning-input>
                <lightning-input type="number" label="Amount Due Now" ></lightning-input>
            </section>

            <!-- Payment Instructions -->
            <section class="slds-box slds-m-bottom_medium">
                <h3 class="slds-text-heading_small slds-m-bottom_small">Payment Instructions</h3>
                <p><strong>Zelle Payments To:</strong> Fundamentalroofingllc@gmail.com</p>
                <p><strong>Venmo Payments To:</strong> @Neil-Martin-1967</p>
                <p><strong>Send Check To:</strong> Fundamental Roofing, 9902 Glenshee Drive, Rowlett, TX 75089</p>
                <p><strong>Credit Card Payments:</strong> Call 214-254-9969 (8AM-8PM Monday-Saturday)</p>
            </section>

            <!-- Buttons -->
            <div class="slds-m-top_medium slds-grid">
                <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
                <lightning-button label="Submit" onclick={handleSubmit}></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
