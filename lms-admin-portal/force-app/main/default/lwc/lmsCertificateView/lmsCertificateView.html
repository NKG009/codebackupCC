<template>
    <div class="cert-card">
        <div class="cert-card__badge">
            <lightning-icon icon-name="utility:ribbon" size="medium"></lightning-icon>
        </div>
        <div class="cert-card__body">
            <span class="cert-card__learner">{cert.Learner__r.Name}</span>
