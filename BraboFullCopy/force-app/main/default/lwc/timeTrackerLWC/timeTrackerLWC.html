<template>
    <lightning-card title="Time Tracker" icon-name="custom:custom95" class="slds-icon-large">
        <lightning-button label="New" slot="actions" onclick={handleNew}></lightning-button>
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>
        <div class="slds-align_absolute-center slds-var-p-around_small">
            <!-- Timer Display and Buttons -->
            <div class="slds-grid slds-gutters">
                <div class="slds-col">
                    <lightning-button-icon icon-name="utility:play" variant="container" alternative-text="Start"
                        class="slds-button_icon-large" onclick={handlePlay}  if:true={showPlay}></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:pause" variant="container" alternative-text="Pause"
                        class="slds-button_icon-large" onclick={handlePause}  if:true={showPause}></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:close" variant="container" alternative-text="Cancel"
                        class="slds-button_icon-large" onclick={handlecancel} if:true={showCancel} ></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:stop" variant="container" alternative-text="Reset"
                        class="slds-button_icon-large" onclick={handleStop} if:true={showStop} ></lightning-button-icon>
                </div>
                <div class="slds-col">
                    <div class="slds-text-heading_large">{sessionTimer}</div>
                </div>

            </div>
        </div>
        <lightning-datatable key-field="TTId" data={timerData} columns={columns} draft-values={draftValues}
            onsave={handleSaveldt} hide-checkbox-column onrowaction={handleRowActions}>
        </lightning-datatable>
        <p slot="footer">Total Time Spent: {totaltimespent}</p>
    </lightning-card>
    <div if:true={isModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
            class="slds-modal slds-fade-in-open slds-modal_medium">
            <div class="slds-modal__container">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
                    onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                        size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>

                <div class="slds-modal__header">
                    <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">Create Timer Record
                    </h1>
                </div>
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <lightning-record-edit-form object-api-name="TimeTracker__c">
                        <lightning-input-field field-name="Started_Date_Time__c" required="true"  data-id="startDateTime" onchange={handleInputChange}>
                        </lightning-input-field>
                        <lightning-input type="number" label="Hours" maxlength="2" required="true" data-id="hours" min="0" max="23" onchange={handleInputChange}>
                        </lightning-input>
                
                        <lightning-input type="number" label="Minutes" maxlength="2" required="true" data-id="minutes" min="0" max="59" onchange={handleInputChange}>
                        </lightning-input>
                        <lightning-input-field field-name="Comments__c" data-id="comments" onchange={handleInputChange}> </lightning-input-field>
                    </lightning-record-edit-form>
                </div>
                <div class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                    <lightning-button variant="brand" label="Save" onclick={handleSaveNew}></lightning-button>

                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
    </div>

</template>
