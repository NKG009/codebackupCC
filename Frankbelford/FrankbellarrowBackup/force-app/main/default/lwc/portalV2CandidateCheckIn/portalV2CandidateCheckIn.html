<template>
  <template lwc:if={loading}>
    <c-portal-v2-candidate-checkin-skeleton></c-portal-v2-candidate-checkin-skeleton>
  </template>
  <template lwc:else>
    <template lwc:if={hasResults}>
      <div class="parent-grid-container">
        <template for:each={jobRoles} for:item="jobRole">
          <div key={jobRole.id} class={jobRole.tileLayoutClass}>
            <c-portal-v2-candidate-check-in-job-role-group
              shift-list={jobRole.shifts}
              job-role-name={jobRole.name}
              start-time={jobRole.startTime}
              end-time={jobRole.endTime}
            ></c-portal-v2-candidate-check-in-job-role-group>
          </div>
        </template>
      </div>
    </template>
    <template lwc:else>
      <div class="no-results">
        <h1>There are currently no active shifts at the selected site.</h1>
      </div>
    </template>
  </template>
</template>
