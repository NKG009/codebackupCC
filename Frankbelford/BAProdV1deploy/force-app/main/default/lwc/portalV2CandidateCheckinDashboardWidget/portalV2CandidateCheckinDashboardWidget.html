<template>
  <div class="card grey-background-color">
    <template if:true={loading}>
      <div class="full-height slds-size_1-of-1 slds-align_absolute-center">
        <div class="spinner">
          <lightning-spinner
            alternative-text="Loading"
            size="large"
          ></lightning-spinner>
        </div>
      </div>
    </template>
    <template if:false={loading}>
      <div class="slds-var-m-horizontal_x-large">
        <!-- Title -->
        <div class="top-bar slds-var-p-top_large">
          <h2 class="header-text font-dark-grey">Today's Workforce</h2>
        </div>
      </div>

      <div class="slds-grid body-container">
        <!-- Left box -->
        <div class="stacked-grid">
          <div>
            <h1 class="indicator-number font-blue-arrow-primary">
              {numCheckedIn}
            </h1>
          </div>
          <div><p class="label font-dark-grey">Signed in</p></div>
          <div>
            <lightning-button
              variant="brand"
              label="View Detail"
              onclick={navigate}
            ></lightning-button>
          </div>
        </div>
        <!-- Right box -->
        <div>
          <div>
            <h1 class="indicator-number negative-number slds-var-p-horizontal_medium">
              {numNotCheckedIn}
            </h1>
          </div>
          <div>
            <p class="font-dark-grey slds-var-p-horizontal_medium">
              Not signed in
            </p>
          </div>
          <div></div>
        </div>
      </div>
    </template>
  </div>
</template>
