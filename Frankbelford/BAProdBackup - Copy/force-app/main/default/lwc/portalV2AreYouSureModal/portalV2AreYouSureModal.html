<template>
  <section
    role="dialog"
    tabindex="-1"
    aria-labelledby="modal-heading-01"
    aria-modal="true"
    class="slds-modal slds-fade-in-open"
  >
    <div class="slds-modal__container">
      <button
        class="
          slds-button slds-button_icon
          slds-modal__close
          slds-button_icon-inverse
        "
        onclick={closeHandler}
      >
        <svg
          class="slds-button__icon slds-button__icon_large"
          aria-hidden="true"
        >
          <use
            xlink:href="/assets/icons/utility-sprite/svg/symbols.svg#close"
          ></use>
        </svg>
        <span class="slds-assistive-text">Cancel and close</span>
      </button>
      <div class="slds-modal__header">
        <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate">
          Are you sure?
        </h1>
      </div>
      <div
        class="slds-modal__content slds-p-around_medium"
        id="modal-content-id-1"
      >
        <p>Are you sure that you would like to {actionName}?</p>
						<template if:true={showCancelRsnSect}>
								
								<div class="slds-grid slds-wrap">
  <div class="slds-col slds-size_1-of-2">
			<lightning:formattedText value="*" style="color:red;"></lightning:formattedText>
								<lightning-formatted-text value="Cancellation Reason" required="true"></lightning-formatted-text>
    <lightning-select
            name="SupCancelRsn"
            label=""
            value={selectedSupCancelRsn}
            options={supCancelRsns}
						onchange={handleSupCancelRsnChange}
            required></lightning-select>
  </div>
								</div>
								
										
					</template>
      </div>
				
				
      <div class="slds-modal__footer">
        <button
          class="slds-button slds-button_neutral"
          aria-label="Cancel and close"
          onclick={closeHandler}
        >
          No
        </button>
        <button class="slds-button slds-button_brand" onclick={yesHandler}>
          Yes
        </button>
      </div>
    </div>
  </section>
  <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
