<template>

  <lightning-record-edit-form object-api-name={objectApiName} record-id={recordId} onsuccess={handleSuccess}>

    <lightning-quick-action-panel header="2nd tier Candidate Audit">

      <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
          <lightning-input-field field-name={AuditResult} onchange={handleAuditResultChange}></lightning-input-field>
          <lightning-input-field field-name={Notefield} onchange={handleNoteChange}></lightning-input-field>
        </div>

      </div>
      <div slot="footer">
        <lightning-button variant="neutral" label="Cancel" onclick={handelCancelClick}>
        </lightning-button>
        <lightning-button variant="brand" type="submit" label="Save">
        </lightning-button>
      </div>

    </lightning-quick-action-panel>
  </lightning-record-edit-form>
</template>
