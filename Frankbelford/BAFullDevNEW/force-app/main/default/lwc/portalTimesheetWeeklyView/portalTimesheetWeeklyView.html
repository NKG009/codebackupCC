            My Timesheets

        <div class="table__header slds-var-p-top_large">
            <div class="supplementary__container"></div>
            <div class="action__container"></div>

            <div class="slds-grid table__header__actionbar flex__row">
                <div class="slds-grid small__gap flex__row">
                    <!--<lightning-button variant="brand" label={viewSwitchLabel} onclick={handleViewToggleClick}>
                </lightning-button>-->
                    <lightning-button variant="brand" label={timePeriodSwitchLabel}

                    </lightning-button>
                </div>
                <div class="slds-grid small__gap flex__row">
                    <lightning-button variant="base" onclick={clearFilter} label="Clear filters">
                    </lightning-button>
                    <lightning-button variant="brand" onclick={handleAdjustColumnClick} label="Adjust columns">
                    </lightning-button>
                    <lightning-button variant="brand" onclick={handleExportClick} label="Export Timesheet">
                    </lightning-button>
                </div>
            </div>
        </div>
        <div class="table__container">
            <template if:true={loading}>

                    <lightning-spinner alternative-text="loading" size="large"></lightning-spinner>
                </div>
            </template>
