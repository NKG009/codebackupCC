<template>

    <template if:true={showRTScreen}>

    </template>

    <lightning-card title="New Account: Account" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <lightning-record-edit-form object-api-name="Account" onsuccess={handleSuccess} onsubmit={handleSubmit}>

                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title">
                        <button aria-controls="expando-unique-id" aria-expanded="true" class="slds-button slds-section__title-action">
                            <span class="slds-truncate" title="Section Title">Account Edit</span>
                        </button>
                    </h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Business_Type__c" required></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input label="RecordTypeId" type="text" value={selectedRecordType} disabled></lightning-input>
                        </div>
                    </div>
                </div>

                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title">
                        <button aria-controls="expando-unique-id" aria-expanded="true" class="slds-button slds-section__title-action">
                            <span class="slds-truncate" title="Section Title">Account Infomation </span>
                        </button>
                    </h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="Name"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="TR1__Status__c"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="OwnerId"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="Phone"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="Fax"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_NationalAccountName__c"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="Website"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_NationalAccountID__c"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="Description"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_SupplierReference__c	"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_CompanyRegistrationNo__c"></lightning-input-field>
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_PublicSectorSupplierOrClient__c	"></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            
                        </div>
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Small_Business_Evidence_Provided__c	"></lightning-input-field>
                        </div>

                    </div>
                </div>

                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title">
                        <button aria-controls="expando-unique-id" aria-expanded="true" class="slds-button slds-section__title-action">
                            <span class="slds-truncate" title="Section Title">Account Restrictions</span>
                        </button>
                    </h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_InvoicingMethod__c" required></lightning-input-field>
                        </div>
                    </div>
                </div>

                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title">
                        <button aria-controls="expando-unique-id" aria-expanded="true" class="slds-button slds-section__title-action">
                            <span class="slds-truncate" title="Section Title">Contract of Business</span>
                        </button>
                    </h3>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Perm_Contractual_Terms__c" required></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Temp_Contractual_Terms__c" required></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Perm_Non_Standard_Terms_Details__c" required></lightning-input-field>
                        </div>

                        <div class="slds-col slds-size_1-of-1 slds-medium-size_6-of-12">
                            <lightning-input-field field-name="IP_Temp_Non_Standard_Terms_Details__c" required></lightning-input-field>
                        </div>
                    </div>
                </div>



                <div class="slds-m-top_medium slds-float_right">
                    <lightning-button class="slds-m-left_small" variant="neutral" label="Cancel" onclick={handleCancel}>
                    </lightning-button>
                    <lightning-button class="slds-m-left_small" variant="brand" label="Save & Add Address"
                        type="submit">
                    </lightning-button>
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>


</template>
