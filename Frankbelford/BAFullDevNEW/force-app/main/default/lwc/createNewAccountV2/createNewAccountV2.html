<template>

    <lightning-card>
        <template if:true={showRTScreen}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
                class="slds-modal slds-fade-in-open slds-modal_small">
                <div class="slds-modal__container">
                    <button class="slds-button slds-button_icon slds-modal__close" onclick={handleRadioCancel}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text="Warning!" title="Warning"></lightning-icon>
                    </button>
                    <div class="slds-modal__header">
                        <h1 id="modal-heading-01" class="slds-modal__title slds-hyphenate" tabindex="-1">New Account
                        </h1>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium " id="modal-content-id-1">
                        <div class="slds-align_absolute-center">
                            <lightning-radio-group name="radioGroup" label="Select a record type" options={options}
                                variant="label-inline" value={selectedRecordTypeId} required
                                onchange={handleRadioButtonChange} data-id="recordTypeRadioGroup" type="radio">
                            </lightning-radio-group>
                        </div>

                    </div>
                    <div class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" aria-label="Cancel and close"
                            onclick={handleRadioCancel}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleRadioSave} >Continue</button>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>

        </template>

                                                    field-name="IP_Temp_Non_Standard_Terms_Details__c">
                                                </lightning-input-field>
                                            </div>
                                        </div>
                                    </div>
                                </template>

                                <div class="slds-m-top_medium slds-float_right">
                                <lightning-button class="slds-m-left_small" variant="neutral" label="Cancel"
                                    onclick={handleCancel}>
                                </lightning-button>
                                <lightning-button class="slds-m-left_small" variant="brand" label="Save & Add Address"
                                    type="submit">
                                </lightning-button>
                            </div>
                            </lightning-record-edit-form>
                        </div>
                    </div>

                        <button class="slds-button slds-button_brand" type="submit" onclick={handleCustomSubmitButton}>{saveButtonLabel}</button>
                    </div>-->
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>

        </template>

        <template if:true={showFlow}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="modal-heading-01"
                class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <button class="slds-button slds-button_icon slds-modal__close" onclick={handleRadioCancel}>
                        <lightning-icon icon-name="utility:close" size="small" alternative-text="Warning!" title="Warning"></lightning-icon>
                    </button>
                    <div class="slds-modal__header">
                        <h1 id="modal-heading-03" class="slds-modal__title slds-hyphenate" tabindex="-1">Account Address
                        </h1>
                    </div>
                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-3">
                        <lightning-flow flow-api-name="Address_Capture" flow-input-variables={inputVariables}
                            onstatuschange={handleStatusChange}>
                        </lightning-flow>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>

        </template>
    </lightning-card>


</template>
