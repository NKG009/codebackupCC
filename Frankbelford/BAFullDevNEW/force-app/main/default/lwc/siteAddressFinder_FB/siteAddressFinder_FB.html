<template>
    <lightning-card>
        <lightning-record-edit-form object-api-name={sObject} record-id={recordId}>
            <lightning-messages> </lightning-messages>
            <lightning-layout multiple-rows>
                <div>
                    <lightning-layout-item size="5">
                        <lightning-input-field field-name={Site_Address_Reference__c}> </lightning-input-field>
                    </lightning-layout-item>
                    <lightning-layout-item size="2"></lightning-layout-item>
                    <lightning-layout-item size="5">
                        <lightning-input-field field-name={Site_Invoice_Address_Reference__c}> </lightning-input-field>
                    </lightning-layout-item>
                </div>
            </lightning-layout>

            <lightning-button class="slds-m-top_small" variant="brand" type="submit" name="Save" label="Save">
            </lightning-button>
        </lightning-record-edit-form>
    </lightning-card>
</template>
