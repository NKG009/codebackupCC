<template>
  <lightning-card title={cardTitle} icon-name={cardIcon}>
    <div class="slds-var-m-around_medium slds-var-p-bottom_medium slds-grid">
      <div class="slds col slds-size_11-of-12">
        <div class="slds-grid slds-gutters">
          <div class="slds-col slds-size_1-of-5">
            <c-custom-lookup-cmp
              obj-name="User"
              object-label="User"
              icon-name="standard:user"
              label-name="Shift Owner"
              placeholder="Filter by shift owner"
              fields={shiftOwnerFields}
              display-fields={shiftOwnerDisplayFields}
              onlookup={handleShiftOwnerLookup}
              default-selected-record={shiftOwnerFilter}
            >
            </c-custom-lookup-cmp>
          </div>
          <div class="slds-col slds-size_1-of-5">
            <c-custom-lookup-cmp
              obj-name="User"
              object-label="User"
              icon-name="standard:user"
              label-name="Job Offer Owner"
              placeholder="Filter by Job Offer owner"
              fields={jobOfferOwnerFields}
              display-fields={jobOfferOwnerDisplayFields}
              onlookup={handleShiftInviteOwnerLookup}
              default-selected-record={jobOfferOwnerFilter}
            >
            </c-custom-lookup-cmp>
          </div>
          <div class="slds-col slds-size_1-of-5">
            <c-custom-lookup-cmp
              obj-name="Contact"
              object-label="Contact"
              icon-name="standard:contact"
              label-name="Candidate"
              placeholder="Filter by candidate"
              fields={candidateFields}
              display-fields={candidateFields}
              onlookup={handleCandidateLookup}
              default-selected-record={candidateFilter}
            >
            </c-custom-lookup-cmp>
          </div>
          <div class="slds-col slds-size_1-of-5">
            <c-custom-lookup-cmp
              obj-name="sirenum__Team__c"
              object-label="Job Role"
              icon-name="custom:custom47"
              label-name="Job Role"
              placeholder="Filter by job role"
              fields={jobRoleFields}
              display-fields={jobRoleDisplayFields}
              onlookup={handleJobRoleLookup}
              default-selected-record={jobRoleFilter}
            >
            </c-custom-lookup-cmp>
          </div>
          <div class="slds-col slds-size_1-of-5">
            <c-custom-lookup-cmp
              obj-name="IP_BranchStatus__c"
              object-label="Branch"
              icon-name="custom:custom99"
              label-name="Branch"
              placeholder="Filter by branch"
              fields={branchFields}
              display-fields={branchFields}
              onlookup={handleBranchLookup}
              default-selected-record={branchCostCodeFilter}
            >
            </c-custom-lookup-cmp>
          </div>
        </div>
      </div>
      <div
        class="
          slds-size_1-of-12
          slds-grid_vertical-align-start slds-grid_align-end
          slds-grid
        "
      >
        <lightning-button-icon
          icon-name="utility:skip_back"
          onclick={refreshData}
        ></lightning-button-icon>
      </div>
    </div>
    <div class="slds-grid slds-var-m-around_medium large-box">
      <div class="slds-col slds-size_11-of-12">
        <lightning-datatable
          key-field="id"
          data={filteredParsedData}
          columns={columns}
          onrowselection={handleRowSelected}
          sorted-by={sortBy}
          sorted-direction={sortDirection}
          onsort={handleSortEvent}
        >
        </lightning-datatable>
        <template if:true={loading}>
          <div>
            <lightning-spinner
              variant="brand"
              alternative-text="Loading..."
              size="medium"
            >
            </lightning-spinner>
          </div>
        </template>
      </div>
      <div class="slds-col slds-size_1-of-12">
        <div
          class="
            slds-grid slds-grid_vertical slds-grid_vertical-align-center
            slds-var-p-horizontal_small
          "
        >
          <button
            class="
              slds-button
              slds-var-m-horizontal_small
              slds-var-m-bottom_medium
              slds-button_success slds-button_stretch
            "
            onclick={acceptRows}
            disabled={acceptDisabled}
          >
            Accept
          </button>
          <button
            class="
              slds-button
              slds-var-m-around_small
              slds-button_destructive
              slds-var-m-vertical_medium
              slds-button_stretch
            "
            onclick={rejectRows}
            disabled={noRowsSelected}
          >
            Reject
          </button>
        </div>
      </div>
    </div>
  </lightning-card>

  <!-- modal start -->      
  <template if:true={isShowRejectModal}>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
       <div class="slds-modal__container">
        <!-- modal header start -->
          <header class="slds-modal__header">
             <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={hideModalBox}>
                <lightning-icon icon-name="utility:close"
                   alternative-text="close"
                   variant="inverse"
                   size="small" ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
             </button>
             <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Add a Rejection Reason</h2>
          </header>
      
          <!-- Rejection Modal Start-->
          <!-- modal body start -->
          <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
               <lightning-combobox
            name="RejectReason"
            label="Rejection Reason"
            value={selectedRejectRsn}
            placeholder="Please Select Rejection Reason"
            options={rejectRsnOptions}
            onchange={handleChangeRejectRsn} ></lightning-combobox>
							<lightning-textarea name="rejectRsnComms" label="Rejection Reason Comments" value={rejectRsnComms}  onchange={handleChangeRejectRsnComments}></lightning-textarea>
          </div>

          <!-- modal footer start-->
          <footer class="slds-modal__footer">
							<lightning-button class="slds-p-right_small" variant="neutral" label="Cancel" title="Cancel" onclick={hideModalBox}></lightning-button>
							<lightning-button variant="brand" label="Confirm" title="Confirm" onclick={saveRejectRsns}></lightning-button>
          </footer>
       
       </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
 </template>
 <!-- modal end -->



  <!-- Validation Modal start -->      
  <template if:true={isShowValidationModal}>
    <div style="width:150px!important;align:center">
    <section role="dialog" tabindex="-1" aria-labelledby="validation-modal-1" aria-modal="true" aria-describedby="validationModal-content-1" class="slds-modal slds-fade-in-open" style="width:100% !important;max-width:80rem !important;margin:auto">
       <div class="slds-modal__container" style="width:100% !important;max-width:80rem !important">
        <!-- modal header start -->
          <header class="slds-modal__header">
             <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={hideValidationModalWindow}>
                <lightning-icon icon-name="utility:close"
                   alternative-text="close"
                   variant="inverse"
                   size="small" ></lightning-icon>
                <span class="slds-assistive-text">Close</span>
             </button>
             <h2 id="validation-modal-1" class="slds-text-heading_medium slds-hyphenate">Following Job Offers have failed due to below errors.</h2>
          </header>
      
          <!-- Rejection Modal Start-->
          <!-- modal body start -->
          <div class="slds-modal__content slds-p-around_medium" id="validationModal-content-1">
               <div class="slds-grid slds-var-m-around_medium large-box">
      <div class="slds-col slds-size_12-of-12" >
        <lightning-datatable
          key-field="id"
          data={failedJOLst}
          columns={validationColumns}
          hide-checkbox-column = true
          max-column-width ='1000px'
          columns-width-mode="auto"
          
        >
        </lightning-datatable>
      </div>
               </div>
          </div>
          <!-- modal footer start-->
          <footer class="slds-modal__footer">
							<lightning-button class="slds-p-right_small" variant="neutral" label="Close" title="Close" onclick={hideValidationModalWindow}></lightning-button>
          </footer>
       
       </div>
    </section>
    </div>
    <div class="slds-backdrop slds-backdrop_open"></div>
 </template>
</template>
