<template>
  <div class="body-wrapper">
    <div class="header-container">
      <img src={headerLogo} />
    </div>

    <div class="input-container">
      <div class="general-error-container">
        <div>
          <div
            role="general-error"
            class="general-error hidden slds-var-m-top_medium"
          >
            <p>{generalError}</p>
          </div>
          <div
            role="general-success"
            class="general-success hidden slds-var-m-top_medium"
          >
            <p>{successMessage}</p>
          </div>
        </div>
      </div>
      <div>
        <lightning-input
          type="email"
          label={emailLabel}
          onchange={emailChange}
          message-when-type-mismatch="Please enter a valid email address."
        ></lightning-input>
        <div role="email-error" class="error hidden">
          <p>{emailError}</p>
        </div>
      </div>
      <button
        onclick={submit}
        class="
          forgot-password-button
          slds-button slds-button_brand
          slds-var-m-top_medium
        "
      >
        Reset Password
      </button>
    </div>
    <div class="footer-container"></div>
  </div>
</template>
