<template>
    <lightning-card title="Mobility Related Services" icon-name="standard:data_streams">
        <div slot="actions">
            <template if:false={isEditing}>
                <lightning-button 
                    label="Edit" 
                    variant="brand" 
                    onclick={handleEdit}
                    disabled={isLoading}>
                </lightning-button>
            </template>

            <template if:true={isEditing}>
                <lightning-button 
                    label="Cancel" 
                    variant="neutral" 
                    onclick={handleCancel}
                    class="slds-m-right_x-small"
                    disabled={isLoading}>
                </lightning-button>
                <lightning-button 
                    label="Save" 
                    variant="brand" 
                    onclick={handleSave}
                    disabled={isLoading}>
                </lightning-button>
            </template>
        </div>

        <div class="slds-p-horizontal_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <template if:true={hasData}>
                    <div class="slds-scrollable_x">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th class="slds-text-title_caps" scope="col">
                                        <div class="slds-truncate" title="Company Name">Company Name</div>
                                    </th>
                                    <th class="slds-text-title_caps" scope="col">
                                        <div class="slds-truncate" title="Service Element">Service Element</div>
                                    </th>
                                    <th class="slds-text-title_caps" scope="col">
                                        <div class="slds-truncate" title="Pricing/Value">Pricing/Value</div>
                                    </th>
                                    <th class="slds-text-title_caps" scope="col">
                                        <div class="slds-truncate" title="Details">Details</div>
                                    </th>
                                    <template if:true={isEditing}>
                                        <th class="slds-text-title_caps" scope="col" style="width: 120px;">
                                            <div class="slds-truncate" title="Actions">Actions</div>
                                        </th>
                                    </template>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={mobilityServices} for:item="service">
                                    <tr key={service.tempId} class="slds-hint-parent">
                                        <!-- Company Name -->
                                        <td data-label="Company Name">
                                            <template if:true={isEditing}>
                                                <lightning-input 
                                                    value={service.Service_Element__c}
                                                    data-id={service.tempId}
                                                    data-field="Service_Element__c"
                                                    onchange={handleInputChange}
                                                    variant="label-hidden"
                                                    placeholder="Enter company name">
                                                </lightning-input>
                                            </template>
                                            <template if:false={isEditing}>
                                                <div class="slds-truncate" title={service.Service_Element__c}>
                                                    <template if:true={service.Service_Element__c}>
                                                        {service.Service_Element__c}
                                                    </template>
                                                    <template if:false={service.Service_Element__c}>
                                                        <span class="slds-text-color_weak">—</span>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Service Element -->
                                        <td data-label="Service Element">
                                            <template if:true={isEditing}>
                                                <lightning-input 
                                                    value={service.TELUS_Roaming__c}
                                                    data-id={service.tempId}
                                                    data-field="TELUS_Roaming__c"
                                                    onchange={handleInputChange}
                                                    variant="label-hidden"
                                                    placeholder="Enter service element">
                                                </lightning-input>
                                            </template>
                                            <template if:false={isEditing}>
                                                <div class="slds-truncate" title={service.TELUS_Roaming__c}>
                                                    <template if:true={service.TELUS_Roaming__c}>
                                                        {service.TELUS_Roaming__c}
                                                    </template>
                                                    <template if:false={service.TELUS_Roaming__c}>
                                                        <span class="slds-text-color_weak">—</span>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Pricing/Value -->
                                        <td data-label="Pricing/Value">
                                            <template if:true={isEditing}>
                                                <lightning-input 
                                                    value={service.TELUS_MVNO_Wholesale__c}
                                                    data-id={service.tempId}
                                                    data-field="TELUS_MVNO_Wholesale__c"
                                                    onchange={handleInputChange}
                                                    variant="label-hidden"
                                                    placeholder="Enter pricing/value">
                                                </lightning-input>
                                            </template>
                                            <template if:false={isEditing}>
                                                <div class="slds-truncate" title={service.TELUS_MVNO_Wholesale__c}>
                                                    <template if:true={service.TELUS_MVNO_Wholesale__c}>
                                                        {service.TELUS_MVNO_Wholesale__c}
                                                    </template>
                                                    <template if:false={service.TELUS_MVNO_Wholesale__c}>
                                                        <span class="slds-text-color_weak">—</span>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Details -->
                                        <td data-label="Details">
                                            <template if:true={isEditing}>
                                                <lightning-input 
                                                    value={service.ROGERS__c}
                                                    data-id={service.tempId}
                                                    data-field="ROGERS__c"
                                                    onchange={handleInputChange}
                                                    variant="label-hidden"
                                                    placeholder="Enter details">
                                                </lightning-input>
                                            </template>
                                            <template if:false={isEditing}>
                                                <div class="slds-truncate" title={service.ROGERS__c}>
                                                    <template if:true={service.ROGERS__c}>
                                                        {service.ROGERS__c}
                                                    </template>
                                                    <template if:false={service.ROGERS__c}>
                                                        <span class="slds-text-color_weak">—</span>
                                                    </template>
                                                </div>
                                            </template>
                                        </td>

                                        <!-- Row Actions -->
                                        <template if:true={isEditing}>
                                            <td data-label="Actions">
                                                <div class="slds-button-group" role="group">
                                                    <lightning-button-icon 
                                                        icon-name="utility:add"
                                                        alternative-text="Add Row"
                                                        title="Add Row Below"
                                                        variant="border-filled"
                                                        size="small"
                                                        data-id={service.tempId}
                                                        onclick={handleAddRow}
                                                        class="slds-m-right_xx-small">
                                                    </lightning-button-icon>
                                                    <lightning-button-icon 
                                                        icon-name="utility:delete"
                                                        alternative-text="Delete Row"
                                                        title="Delete Row"
                                                        variant="border-filled"
                                                        size="small"
                                                        data-id={service.tempId}
                                                        onclick={handleDeleteRow}
                                                        class="slds-button_destructive">
                                                    </lightning-button-icon>
                                                </div>
                                            </td>
                                        </template>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template if:false={hasData}>
                    <div class="slds-text-align_center slds-p-vertical_large">
                        <p>No mobility services found. Click Edit to add new services.</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>

    <!-- Delete Confirmation Modal -->
    <template if:true={showDeleteModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon 
                        class="slds-modal__close"
                        title="Close"
                        icon-name="utility:close"
                        icon-class="slds-button_icon-inverse"
                        onclick={handleDeleteCancel}>
                    </lightning-button-icon>
                    <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">Confirm Delete</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <div class="slds-text-align_center">
                        <lightning-icon icon-name="utility:warning" variant="warning" size="large" class="slds-m-bottom_small"></lightning-icon>
                        <p class="slds-text-heading_medium slds-m-bottom_small">
                            Are you sure you want to delete this record?
                        </p>
                        <p class="slds-text-body_regular slds-text-color_weak">
                            <template if:true={deleteRecordName}>
                                Record: <strong>{deleteRecordName}</strong>
                            </template>
                            <template if:false={deleteRecordName}>
                                This action cannot be undone.
                            </template>
                        </p>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button 
                        variant="neutral" 
                        label="No, Cancel"
                        title="Cancel Delete"
                        onclick={handleDeleteCancel}
                        class="slds-m-right_x-small">
                    </lightning-button>
                    <lightning-button 
                        variant="destructive" 
                        label="Yes, Delete"
                        title="Confirm Delete"
                        onclick={handleDeleteConfirm}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
