<template>
    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open slds-modal_full">
            <div class="slds-modal__container slds-modal__container_full">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" title="Close" icon-name="utility:close" icon-class="slds-button_icon-inverse" onclick={closeModal}></lightning-button-icon>
                </header>
                
                <div class="slds-modal__content slds-p-around_none" id="modal-content-id-1">
                    <iframe src={url}  width="100%" height="600px" frameborder="0"></iframe>
                </div>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
